function showMessage(msg){
alert(msg)
}

/* =========================
   LOGIN FUNCTION
========================= */

function login(){

var lembaga = document.getElementById("lembaga").value
var kode = document.getElementById("kode").value

google.script.run
.withSuccessHandler(function(res){

if(res){

window.location="?page=dashboard"

}else{

alert("Login gagal")

}

})
.loginSystem(lembaga,kode)

}


/* =========================
   DASHBOARD
========================= */

function loadJumlahSiswa(){

google.script.run
.withSuccessHandler(function(res){

document.getElementById("jumlah_siswa").innerHTML = res

})
.getJumlahSiswa()

}

</script>

<script>

function loadDataSiswa(){

google.script.run
.withSuccessHandler(function(data){

var tbody = document.querySelector("#tabel_siswa tbody")

tbody.innerHTML=""

data.forEach(function(row){

var tr = document.createElement("tr")

tr.innerHTML = `
<td>${row[0]}</td>
<td>${row[1]}</td>
<td>${row[2]}</td>
<td>${row[3]}</td>
<td>${row[4]}</td>
<td>
<button onclick="hapusSiswa('${row[0]}')">Hapus</button>
</td>
`

tbody.appendChild(tr)

})

})
.getDataSiswa()

}
<script>

function simpanSiswa(){

var nisn = document.getElementById("nisn").value
var nama = document.getElementById("nama").value
var jk = document.getElementById("jk").value
var kelas = document.getElementById("kelas").value
var jurusan = document.getElementById("jurusan").value

google.script.run
.withSuccessHandler(function(){

alert("Data siswa berhasil disimpan")

loadDataSiswa()

})
.tambahSiswa(nisn,nama,jk,kelas,jurusan)

}

</script>

<script>

function hapusSiswa(nisn){

if(confirm("Yakin hapus siswa?")){

google.script.run
.withSuccessHandler(function(){

loadDataSiswa()

})
.hapusSiswa(nisn)

}

}

</script>

<script>

function uploadFile(){

var file = document.getElementById("fileUpload").files[0]

if(!file){

alert("Pilih file terlebih dahulu")

return

}

var reader = new FileReader()

reader.onload = function(e){

var data = e.target.result

var mapel = document.getElementById("mapel_import").value
var semester = document.getElementById("semester_import").value
var tahun = document.getElementById("tahun_import").value

google.script.run
.withSuccessHandler(function(res){

document.getElementById("status_import").innerHTML="Import selesai"

})
.importNilai(data,file.name,mapel,semester,tahun)

}

reader.readAsDataURL(file)

}

</script>

<script>

function buatRapor(){

var nisn = document.getElementById("nisn_rapor").value
var semester = document.getElementById("semester_rapor").value
var tahun = document.getElementById("tahun_rapor").value

google.script.run
.withSuccessHandler(function(url){

document.getElementById("link_pdf").innerHTML =
"<a href='"+url+"' target='_blank'>Download Rapor</a>"

})
.generateRapor(nisn,semester,tahun)

}

</script>

<script>

function generateKelas(){

var kelas = document.getElementById("kelas_rapor").value
var semester = document.getElementById("semester_rapor").value
var tahun = document.getElementById("tahun_rapor").value

google.script.run
.withSuccessHandler(function(data){

var html=""

data.forEach(function(url){

html += "<a href='"+url+"' target='_blank'>Download Rapor</a><br>"

})

document.getElementById("hasil_rapor").innerHTML=html

})
.generateRaporKelas(kelas,semester,tahun)

}

</script>
