<h2>Data Mata Pelajaran</h2>

<button onclick="loadDataMapel()">Refresh</button>

<table border="1" width="100%" id="tabel_mapel">
  <thead>
    <tr>
      <th>Kode</th>
      <th>Nama</th>
      <th>Tingkat</th>
      <th>Jurusan</th>
      <th>KKM</th>
      <th>Aksi</th>
    </tr>
  </thead>

  <tbody></tbody>
</table>

<h3>Tambah Mapel</h3>

<input id="kode_mapel" placeholder="Kode Mapel">
<input id="nama_mapel" placeholder="Nama Mapel">
<input id="tingkat_mapel" placeholder="Tingkat">
<input id="jurusan_mapel" placeholder="Jurusan">
<input id="kkm_mapel" placeholder="KKM">

<button onclick="simpanMapel()">Simpan</button>
