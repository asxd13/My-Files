<h2>Data Kelas</h2>

<button onclick="loadDataKelas()">Refresh</button>

<table border="1" width="100%" id="tabel_kelas">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nama Kelas</th>
            <th>Tingkat</th>
            <th>Jurusan</th>
            <th>Wali Kelas</th>
            <th>Aksi</th>
        </tr>
    </thead>

    <tbody></tbody>
</table>

<h3>Tambah Kelas</h3>

<input id="id_kelas" placeholder="ID">
<input id="nama_kelas" placeholder="Nama Kelas">
<input id="tingkat_kelas" placeholder="Tingkat">
<input id="jurusan_kelas" placeholder="Jurusan">
<input id="wali_kelas" placeholder="Wali Kelas">

<button onclick="simpanKelas()">Simpan</button>
